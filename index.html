<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Layout Drafter</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 overflow-hidden select-none text-gray-800">

    <div id="app" class="relative h-screen w-screen flex flex-col">

        <main id="map-container" class="absolute inset-0 z-0">
            <div id="map" class="absolute inset-0"></div>
        </main>

        <div id="tracing-layer" class="absolute inset-0 z-20 pointer-events-none transition-colors duration-200" style="background-color: rgba(255, 255, 255, 0);"></div>

        <div id="ui-layer" class="absolute inset-0 z-50 pointer-events-none flex flex-col hidden">
            
            <header class="h-14 bg-blue-900 text-white flex justify-between items-center px-4 shadow-md pointer-events-auto">
                <div class="flex items-center gap-3">
                    <button id="btn-menu" class="p-2 bg-blue-800 rounded active:bg-blue-700 text-xl leading-none">☰</button>
                    <span id="display-area-id" class="font-bold text-sm tracking-wide">Area: NOT SET</span>
                </div>
                <div class="flex flex-col items-center justify-center">
                    <span class="text-xs font-bold text-gray-300">NORTH</span>
                    <span class="text-lg leading-none">▲</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-1 bg-blue-950 px-2 py-1 rounded">
                        <div id="gps-status" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_5px_rgba(239,68,68,0.8)]"></div>
                        <span id="gps-accuracy-text" class="text-[10px] font-mono">-- m</span>
                    </div>
                    <button id="btn-export" class="px-3 py-1.5 bg-green-600 rounded text-xs font-bold active:bg-green-500 shadow">EXPORT PDF</button>
                </div>
            </header>
            
            <div id="settings-menu" class="absolute top-0 left-0 bottom-0 w-3/4 max-w-sm bg-white shadow-2xl z-[100] transform -translate-x-full transition-transform duration-300 pointer-events-auto flex flex-col">
                <div class="bg-blue-900 text-white p-4 flex justify-between items-center">
                    <h2 class="font-bold text-lg">Menu &amp; Settings</h2>
                    <button id="btn-close-menu" class="text-white text-2xl leading-none px-2 active:text-gray-300">&times;</button>
                </div>
                
                <div class="p-4 flex-grow overflow-y-auto">
                    <div class="mb-6">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Live Statistics</h3>
                        <div class="bg-gray-50 rounded-lg p-3 border border-gray-200 text-sm">
                            <p class="mb-1">🏠 Buildings: <span id="stat-bldg" class="font-bold text-blue-600">0</span></p>
                            <p class="mb-1">⭐ Landmarks: <span id="stat-lm" class="font-bold text-blue-600">0</span></p>
                            <p>✏️ Lines/Roads: <span id="stat-lines" class="font-bold text-blue-600">0</span></p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Map Configuration</h3>
                        <button class="w-full text-left p-3 border-b border-gray-100 text-sm font-bold active:bg-gray-50">🛰️ Satellite View (Active)</button>
                        <button class="w-full text-left p-3 border-b border-gray-100 text-sm font-bold active:bg-gray-50 text-gray-400">⛰️ Terrain View (Disabled)</button>
                    </div>

                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">System Actions</h3>
                        <button id="btn-emergency-reset" class="w-full text-left p-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold active:bg-red-100 mb-2 border border-red-200">
                            🔄 Emergency Reset (Wipe Data)
                        </button>
                    </div>
                </div>
            </div>
            <div id="menu-overlay" class="absolute inset-0 bg-black/50 z-[90] hidden pointer-events-auto transition-opacity"></div>
            <div class="absolute left-2 top-1/4 bottom-1/4 flex flex-col items-center justify-center pointer-events-auto bg-white/80 backdrop-blur rounded-full py-4 px-2 shadow-lg border border-gray-200">
                <span class="text-[10px] font-bold text-gray-600 mb-2">Paper</span>
                <input type="range" id="smokiness-slider" min="0" max="100" value="0" class="vertical-slider">
                <span class="text-[10px] font-bold text-gray-600 mt-2">Map</span>
            </div>

            <div id="fab-container" class="absolute bottom-6 right-6 flex flex-col items-end gap-3 pointer-events-auto">
                
                <div id="fab-submenu" class="hidden flex-row-reverse gap-2 bg-white/90 backdrop-blur p-2 rounded-xl shadow-xl border border-gray-200 mb-2">
                    </div>

                <div id="fab-categories" class="hidden flex-col gap-3 mb-2 items-center">
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100" data-cat="eraser">🧽</button>
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100" data-cat="landmark">⭐</button>
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100" data-cat="line">✏️</button>
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100" data-cat="building">🏠</button>
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100" data-cat="hand">🖐️</button>
                </div>

                <button id="fab-main" class="w-16 h-16 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-3xl active:bg-blue-700 transition-transform">
                    🖐️ </button>
            </div>
            
        </div> <div id="setup-layer" class="absolute inset-0 z-[100] pointer-events-auto flex items-center justify-center bg-black/40 backdrop-blur-sm">
            <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                <div class="w-16 h-16 border-2 border-white rounded-full flex items-center justify-center shadow-[0_0_10px_rgba(0,0,0,0.5)]">
                    <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                </div>
                <div class="absolute w-full h-[1px] bg-white/50"></div>
                <div class="absolute h-full w-[1px] bg-white/50"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-2xl w-80 relative z-10 mr-[-40%] mt-[-20%]">
                <h2 class="text-xl font-bold text-gray-800 mb-1">Area Setup</h2>
                <p class="text-xs text-gray-500 mb-4">Center the map on your target area.</p>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-700">Drafter Name / ID</label>
                        <input type="text" id="setup-name" class="w-full mt-1 border border-gray-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. John Doe (ID:101)">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700">Area / Block ID</label>
                        <input type="text" id="setup-area" class="w-full mt-1 border border-gray-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. BLOCK-045">
                    </div>
                </div>
                
                <button id="btn-lock-area" class="w-full mt-6 py-3 bg-blue-600 text-white font-bold rounded-xl active:bg-blue-700 shadow-lg disabled:opacity-50 disabled:bg-gray-400">
                    Lock Area &amp; Start Drafting
                </button>
            </div>
        </div>

        <div id="inspector-panel" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-2xl border border-gray-200 z-[100] p-5 w-72 pointer-events-auto">
            <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">Edit Feature</h3>
            <div class="mb-3">
                <label class="block text-xs font-bold text-gray-600">Reference Number</label>
                <input type="text" id="inspect-ref-no" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="mb-5">
                <label class="block text-xs font-bold text-gray-600">Sub-Count (e.g., Houses)</label>
                <input type="number" id="inspect-sub-count" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex justify-between gap-3">
                <button id="btn-delete-feature" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg text-sm font-bold active:bg-red-200">Delete</button>
                <button id="btn-save-feature" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold flex-grow active:bg-blue-700">Save</button>
            </div>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
