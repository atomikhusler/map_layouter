<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Layout Drafter</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 overflow-hidden select-none text-gray-800">

    <div id="app" class="relative h-screen w-screen flex flex-col">

        <main id="map-container" class="absolute inset-0 z-0">
            <div id="map" class="absolute inset-0"></div>
        </main>

        <div id="tracing-layer" class="absolute inset-0 z-20 pointer-events-none transition-colors duration-200" style="background-color: rgba(255, 255, 255, 0);"></div>

        <div id="ui-layer" class="absolute inset-0 z-50 pointer-events-none flex flex-col hidden">
            
            <header class="h-14 bg-blue-900 text-white flex justify-between items-center px-4 shadow-md pointer-events-auto">
                <div class="flex items-center gap-3">
                    <button id="btn-menu" class="p-2 bg-blue-800 rounded active:bg-blue-700 text-xl leading-none">☰</button>
                    <span id="display-area-id" class="font-bold text-sm tracking-wide truncate max-w-[100px] sm:max-w-[200px]">Area: NOT SET</span>
                </div>
                <div class="flex flex-col items-center justify-center">
                    <span class="text-[10px] font-bold text-gray-300">NORTH</span>
                    <span class="text-sm leading-none">▲</span>
                </div>
                <div class="flex items-center gap-2 sm:gap-3">
                    <div class="flex items-center gap-1 bg-blue-950 px-2 py-1 rounded border border-blue-800 active:bg-blue-800 transition-colors">
                        <div id="gps-status" class="w-3 h-3 rounded-full bg-gray-400"></div>
                        <span id="gps-accuracy-text" class="text-[10px] font-mono font-bold ml-1 text-gray-400">GPS Off</span>
                    </div>
                    <button id="btn-export" class="px-2 sm:px-3 py-1.5 bg-green-600 rounded text-xs font-bold active:bg-green-500 shadow">EXPORT</button>
                </div>
            </header>

            <div class="absolute top-16 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-panel p-2 rounded-full flex items-center gap-3 pointer-events-auto shadow-sm z-50">
                <span class="text-[10px] font-bold text-gray-700 ml-2">MAP</span>
                <input type="range" id="smokiness-slider" min="0" max="100" value="0" class="horizontal-slider flex-grow">
                <span class="text-[10px] font-bold text-gray-700">PAPER</span>
                <button id="btn-refresh" class="p-1.5 bg-black/5 rounded-full hover:bg-black/10 active:rotate-180 transition-transform">🔄</button>
            </div>

            <div class="absolute bottom-6 left-6 pointer-events-auto flex items-center gap-3 glass-panel p-1.5 pl-2 pr-4 rounded-full shadow-lg z-50">
                <img src="logo.png" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'32\' height=\'32\'><rect width=\'32\' height=\'32\' fill=\'%233b82f6\'/></svg>'" class="w-8 h-8 rounded-full object-cover border border-white/50 shadow-sm bg-white" alt="Logo">
                <div class="flex flex-col">
                    <span class="text-[8px] uppercase tracking-widest text-gray-500 font-bold leading-none">Developed by</span>
                    <span class="text-xs font-bold text-gray-800">Sahil Kumar Rout</span>
                </div>
            </div>
            
            <div id="settings-menu" class="absolute top-0 left-0 bottom-0 w-3/4 max-w-sm bg-white shadow-2xl z-[100] transform -translate-x-full transition-transform duration-300 pointer-events-auto flex flex-col">
                <div class="bg-blue-900 text-white p-4 flex justify-between items-center">
                    <h2 class="font-bold text-lg">Settings</h2>
                    <button id="btn-close-menu" class="text-white text-3xl leading-none px-2 active:text-gray-300">&times;</button>
                </div>
                
                <div class="p-4 flex-grow overflow-y-auto">
                    <div class="mb-6">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Live Statistics</h3>
                        <div class="bg-gray-50 rounded-lg p-3 border border-gray-200 text-sm">
                            <p class="mb-1">🏠 Buildings: <span id="stat-bldg" class="font-bold text-blue-600">0</span></p>
                            <p class="mb-1">⭐ Landmarks: <span id="stat-lm" class="font-bold text-blue-600">0</span></p>
                            <p>✏️ Lines/Roads: <span id="stat-lines" class="font-bold text-blue-600">0</span></p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">System Actions</h3>
                        <button id="btn-emergency-reset" class="w-full text-left p-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold active:bg-red-100 mb-2 border border-red-200">
                            🔄 Emergency Reset (Wipe Data)
                        </button>
                    </div>
                </div>
            </div>
            <div id="menu-overlay" class="absolute inset-0 bg-black/50 z-[90] hidden pointer-events-auto transition-opacity"></div>

            <div id="fab-container" class="absolute bottom-6 right-6 flex flex-col items-end gap-3 pointer-events-auto z-[60]">
                <div id="fab-submenu" class="hidden flex-col gap-2 glass-panel p-2 rounded-xl shadow-xl mb-2"></div>

                <div id="fab-categories" class="hidden flex-col gap-3 mb-2 items-center">
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100 text-xl" data-cat="eraser">🧽</button>
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100 text-xl" data-cat="landmark">⭐</button>
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100 text-xl" data-cat="line">✏️</button>
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100 text-xl" data-cat="building">🏠</button>
                    <button class="fab-cat-btn bg-white text-gray-700 p-3 rounded-full shadow-lg border border-gray-200 active:bg-gray-100 text-xl" data-cat="hand">🖐️</button>
                </div>

                <button id="fab-main" class="w-16 h-16 bg-blue-600 text-white rounded-full shadow-[0_8px_16px_rgba(37,99,235,0.4)] flex items-center justify-center text-3xl active:bg-blue-700 transition-transform active:scale-95 cursor-move">
                    🖐️
                </button>
            </div>
            
        </div> 

        <div id="setup-layer" class="absolute inset-0 z-[100] pointer-events-auto flex items-center justify-center bg-black/50 backdrop-blur-sm">
            
            <div id="setup-step-a" class="bg-white/95 backdrop-blur p-6 rounded-3xl shadow-2xl w-[90%] max-w-sm text-center transform transition-all">
                <h2 class="text-2xl font-black text-gray-800 mb-1">Drafting Setup</h2>
                <p class="text-xs text-gray-500 mb-6 font-medium">Enter details to initiate your secure session.</p>
                
                <div class="space-y-4 text-left">
                    <div>
                        <label class="block text-[10px] uppercase tracking-wider font-bold text-gray-500 ml-1">Drafter Name / ID</label>
                        <input type="text" id="setup-name" class="w-full mt-1 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="e.g. John Doe (ID:101)">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-wider font-bold text-gray-500 ml-1">Area / Block ID</label>
                        <input type="text" id="setup-area" class="w-full mt-1 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="e.g. BLOCK-045">
                    </div>
                </div>
                
                <button id="btn-to-step-b" disabled class="w-full mt-8 py-3.5 bg-blue-600 text-white font-bold rounded-xl active:bg-blue-700 shadow-lg shadow-blue-600/30 disabled:opacity-50 disabled:shadow-none transition-all">
                    Next: Find Area
                </button>
            </div>

            <div id="setup-step-b" class="hidden absolute inset-0 flex flex-col items-center">
                
                <div class="mt-8 w-[90%] max-w-md bg-white p-2 rounded-2xl shadow-2xl flex gap-2 pointer-events-auto border border-gray-100">
                    <input type="text" id="map-search" class="flex-grow p-2 pl-3 text-sm outline-none" placeholder="Search Place, Village, or Lat,Lng...">
                    <button id="btn-search" class="bg-gray-900 text-white px-5 py-2 rounded-xl text-sm font-bold active:scale-95 transition-transform">Find</button>
                </div>
                
                <div class="flex-grow flex items-center justify-center pointer-events-none">
                    <div class="relative w-16 h-16 flex items-center justify-center">
                        <div class="absolute w-full h-[2px] bg-blue-600/80"></div>
                        <div class="absolute h-full w-[2px] bg-blue-600/80"></div>
                        <div class="w-3 h-3 border-2 border-white bg-blue-600 rounded-full z-10 shadow-md"></div>
                    </div>
                </div>
                
                <div class="w-full p-6 pb-10 flex justify-center pointer-events-auto bg-gradient-to-t from-black/60 to-transparent">
                    <button id="btn-lock-area" class="w-[90%] max-w-sm py-4 bg-green-500 text-white text-lg font-black tracking-wide rounded-2xl shadow-[0_10px_20px_rgba(34,197,94,0.4)] active:scale-95 transition-transform border border-green-400">
                        CONFIRM &amp; LOCK AREA
                    </button>
                </div>
            </div>

        </div>

        <div id="inspector-panel" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-2xl border border-gray-200 z-[200] p-5 w-[90%] max-w-[280px] pointer-events-auto">
            <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">Edit Building</h3>
            <div class="mb-3">
                <label class="block text-[10px] uppercase font-bold text-gray-500 ml-1">Building Sl. No.</label>
                <input type="text" id="inspect-ref-no" class="w-full mt-1 border border-gray-200 rounded-xl p-3 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="mb-5">
                <label class="block text-[10px] uppercase font-bold text-gray-500 ml-1">No. of House(s)</label>
                <input type="number" id="inspect-sub-count" class="w-full mt-1 border border-gray-200 rounded-xl p-3 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex justify-between gap-3">
                <button id="btn-delete-feature" class="px-4 py-3 bg-red-50 text-red-600 border border-red-100 rounded-xl text-sm font-bold active:bg-red-100 transition-colors">Delete</button>
                <button id="btn-save-feature" class="px-4 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold flex-grow active:bg-blue-700 shadow-md transition-colors">Save Update</button>
            </div>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
